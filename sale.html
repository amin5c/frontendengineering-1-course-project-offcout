<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OffCourt - Sale</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .sale-banner { background: #e94560; color: white; text-align: center; padding: 14px; font-size: 18px; font-weight: bold; }
    .sale-stats { background: white; border: 2px solid #1a1a2e; padding: 14px 20px; margin-bottom: 20px; display: flex; gap: 30px; flex-wrap: wrap; }
    .sale-stats span { font-size: 13px; }
    .sale-stats b { color: #e94560; }
    .original-price { text-decoration: line-through; color: #888; font-size: 13px; margin-right: 6px; }
    .sale-price { color: #e94560; font-size: 18px; font-weight: bold; }
    .save-badge { background: #e94560; color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; margin-left: 6px; }
  </style>
</head>
<body>

  <div class="page-nav">
    <a href="index.html">Home</a>
    <a href="sale.html" class="active">Sale</a>
    <a href="compare.html">Compare</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
  </div>

  <nav class="navbar">
    <h1>Off<span>Court</span> - Sale</h1>
  </nav>

  <div class="sale-banner">LIMITED TIME DEALS - UP TO 25% OFF!</div>

  <div class="main">
    <div class="sale-stats" id="sale-stats"></div>

    <div class="filter-row">
      <button class="filter-btn active" data-max="999">All Deals</button>
      <button class="filter-btn" data-max="100">Under $100</button>
      <button class="filter-btn" data-max="150">Under $150</button>
      <select id="sort-sale">
        <option value="saving">Biggest Saving First</option>
        <option value="price">Price: Low to High</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>

    <div class="product-grid" id="sale-grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  const sneakers = [
    { id:1, name:"Air Velocity Pro",  brand:"SpeedX",     price:159.99, category:"running",    rating:4.7, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/e/9/e9a821bNike-IF4391-100_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:2, name:"Urban Classic",     brand:"StreetWear", price:89.99,  category:"casual",     rating:4.3, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/b/0/b0e4965Nike-IR5776-400_1.png?rnd=20200526195200&tr=w-1080" },
    { id:3, name:"Court Dominator",   brand:"HoopKing",   price:199.99, category:"basketball", rating:4.9, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-554724-069_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:4, name:"Breeze Runner",     brand:"SpeedX",     price:129.99, category:"running",    rating:4.5, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IU2363-100_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:5, name:"Retro Vibe",        brand:"StreetWear", price:109.99, category:"casual",     rating:4.6, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IB7746-200_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:6, name:"Shadow Elite",      brand:"HoopKing",   price:219.99, category:"basketball", rating:4.8, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-DN3577-700_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:7, name:"Trail Blazer X",    brand:"SpeedX",     price:174.99, category:"running",    rating:4.4, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IM4692-200_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:8, name:"Daily Step",        brand:"StreetWear", price:69.99,  category:"casual",     rating:4.1, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/9/f/9fe448dNike-IB6606-600_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:9, name:"Slam Dunk Pro",     brand:"HoopKing",   price:189.99, category:"basketball", rating:4.7, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/f/f/ff7c9fbNike-DZ5485-003_1.jpg?rnd=20200526195200&tr=w-1080" },
  ];

  const discounts = { running: 0.20, casual: 0.15, basketball: 0.25 };

  function formatPrice(price) {
    return "$" + price.toFixed(2);
  }

  var saleItems = sneakers.map(function(s) {
    var rate = discounts[s.category];
    var salePrice = parseFloat((s.price * (1 - rate)).toFixed(2));
    var saving = parseFloat((s.price - salePrice).toFixed(2));
    return { id: s.id, name: s.name, brand: s.brand, price: s.price, rating: s.rating, img: s.img, salePrice: salePrice, saving: saving };
  });

  var maxPrice = 999;
  var sortOpt = "saving";

  function renderStats() {
    var totalSaved = saleItems.reduce(function(acc, s) {
      return acc + s.saving;
    }, 0);

    var cheapest = saleItems.reduce(function(min, s) {
      if (s.salePrice < min.salePrice) {
        return s;
      }
      return min;
    });

    document.getElementById("sale-stats").innerHTML =
      "<span>Items on sale: <b>" + saleItems.length + "</b></span>" +
      "<span>Total you could save: <b>" + formatPrice(totalSaved) + "</b></span>" +
      "<span>Cheapest deal: <b>" + cheapest.name + " @ " + formatPrice(cheapest.salePrice) + "</b></span>";
  }

  function renderSale() {
    var list = saleItems.filter(function(s) {
      return s.salePrice <= maxPrice;
    });

    list = list.sort(function(a, b) {
      switch (sortOpt) {
        case "saving": return b.saving - a.saving;
        case "price":  return a.salePrice - b.salePrice;
        case "rating": return b.rating - a.rating;
        default:       return 0;
      }
    });

    var grid = document.getElementById("sale-grid");

    if (list.length === 0) {
      grid.innerHTML = "<div class='empty-state'>No deals in this range.</div>";
      return;
    }

    grid.innerHTML = list.map(function(s) {
      return (
        "<div class='sneaker-card'>" +
          "<img src='" + s.img + "' alt='" + s.name + "'>" +
          "<div class='card-body'>" +
            "<div class='card-brand'>" + s.brand + "</div>" +
            "<div class='card-name'>" + s.name + "</div>" +
            "<div class='card-rating'>* " + s.rating + "</div>" +
            "<div class='card-bottom'>" +
              "<div>" +
                "<span class='original-price'>" + formatPrice(s.price) + "</span>" +
                "<span class='sale-price'>" + formatPrice(s.salePrice) + "</span>" +
                "<span class='save-badge'>SAVE " + formatPrice(s.saving) + "</span>" +
              "</div>" +
            "</div>" +
            "<button class='add-btn' style='width:100%;margin-top:10px;' onclick='addAndToast(\"" + s.name + "\")'>Add to Cart</button>" +
          "</div>" +
        "</div>"
      );
    }).join("");
  }

  function addAndToast(name) {
    var el = document.getElementById("toast");
    el.textContent = name + " added to cart!";
    el.classList.add("show");
    setTimeout(function() {
      el.classList.remove("show");
    }, 2500);
  }

  var filterBtns = document.querySelectorAll(".filter-btn");
  filterBtns.forEach(function(btn) {
    btn.addEventListener("click", function() {
      maxPrice = parseFloat(btn.getAttribute("data-max"));
      filterBtns.forEach(function(b) {
        b.classList.remove("active");
      });
      btn.classList.add("active");
      renderSale();
    });
  });

  document.getElementById("sort-sale").addEventListener("change", function(e) {
    sortOpt = e.target.value;
    renderSale();
  });

  renderStats();
  renderSale();
  </script>
</body>
</html>
