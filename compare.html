<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OffCourt - Compare</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .compare-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    @media (max-width: 600px) { .compare-wrap { grid-template-columns: 1fr; } }
    .compare-slot { background: white; border: 2px solid #1a1a2e; padding: 16px; }
    .compare-slot h3 { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
    .compare-slot select { width: 100%; border: 2px solid #1a1a2e; padding: 6px 8px; font-size: 13px; background: white; margin-bottom: 12px; }
    .compare-slot img { width: 100%; height: 180px; object-fit: cover; border: 2px solid #1a1a2e; margin-bottom: 12px; }
    .placeholder { width: 100%; height: 180px; background: #f0f0f0; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #888; margin-bottom: 12px; }
    .spec-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; font-size: 13px; }
    .winner { color: #155724; background: #d4edda; padding: 1px 6px; font-weight: bold; }
    .verdict-box { background: #1a1a2e; color: white; padding: 16px; text-align: center; border: 2px solid #e94560; margin-top: 10px; }
    .verdict-box h3 { color: #e94560; margin-bottom: 8px; }
    .verdict-box p { font-size: 13px; color: #ccc; }
    .vs-label { display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #e94560; }
  </style>
</head>
<body>

  <div class="page-nav">
    <a href="index.html">Home</a>
    <a href="sale.html">Sale</a>
    <a href="compare.html" class="active">Compare</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
  </div>

  <nav class="navbar">
    <h1>Off<span>Court</span> - Compare</h1>
  </nav>

  <div class="hero" style="padding:20px;">
    <h2>Compare <span>Sneakers</span></h2>
    <p>Pick two sneakers and see which one wins.</p>
  </div>

  <div class="main">
    <div class="compare-wrap">
      <div class="compare-slot">
        <h3>Sneaker A</h3>
        <select id="pick-a" onchange="renderCompare()">
          <option value="">-- Pick a sneaker --</option>
        </select>
        <div id="slot-a"><div class="placeholder">Select a sneaker</div></div>
      </div>
      <div class="vs-label">VS</div>
      <div class="compare-slot">
        <h3>Sneaker B</h3>
        <select id="pick-b" onchange="renderCompare()">
          <option value="">-- Pick a sneaker --</option>
        </select>
        <div id="slot-b"><div class="placeholder">Select a sneaker</div></div>
      </div>
    </div>
    <div id="verdict"></div>
  </div>

  <script>
  const sneakers = [
    { id:1, name:"Air Velocity Pro",  brand:"SpeedX",     price:159.99, category:"running",    rating:4.7, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/e/9/e9a821bNike-IF4391-100_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:2, name:"Urban Classic",     brand:"StreetWear", price:89.99,  category:"casual",     rating:4.3, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/b/0/b0e4965Nike-IR5776-400_1.png?rnd=20200526195200&tr=w-1080" },
    { id:3, name:"Court Dominator",   brand:"HoopKing",   price:199.99, category:"basketball", rating:4.9, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-554724-069_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:4, name:"Breeze Runner",     brand:"SpeedX",     price:129.99, category:"running",    rating:4.5, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IU2363-100_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:5, name:"Retro Vibe",        brand:"StreetWear", price:109.99, category:"casual",     rating:4.6, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IB7746-200_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:6, name:"Shadow Elite",      brand:"HoopKing",   price:219.99, category:"basketball", rating:4.8, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-DN3577-700_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:7, name:"Trail Blazer X",    brand:"SpeedX",     price:174.99, category:"running",    rating:4.4, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/5/3/5324c8eNike-IM4692-200_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:8, name:"Daily Step",        brand:"StreetWear", price:69.99,  category:"casual",     rating:4.1, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/9/f/9fe448dNike-IB6606-600_1.jpg?rnd=20200526195200&tr=w-1080" },
    { id:9, name:"Slam Dunk Pro",     brand:"HoopKing",   price:189.99, category:"basketball", rating:4.7, img:"https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/f/f/ff7c9fbNike-DZ5485-003_1.jpg?rnd=20200526195200&tr=w-1080" },
  ];

  function formatPrice(price) {
    return "$" + price.toFixed(2);
  }

  function makeScoreTracker() {
    var scoreA = 0;
    var scoreB = 0;
    return {
      aWins: function() { scoreA = scoreA + 1; },
      bWins: function() { scoreB = scoreB + 1; },
      getA:  function() { return scoreA; },
      getB:  function() { return scoreB; }
    };
  }

  var opts = sneakers.map(function(s) {
    return "<option value='" + s.id + "'>" + s.name + "</option>";
  }).join("");
  document.getElementById("pick-a").innerHTML += opts;
  document.getElementById("pick-b").innerHTML += opts;

  function renderCompare() {
    var idA = parseInt(document.getElementById("pick-a").value);
    var idB = parseInt(document.getElementById("pick-b").value);

    if (!idA) {
      document.getElementById("slot-a").innerHTML = "<div class='placeholder'>Select a sneaker</div>";
    }
    if (!idB) {
      document.getElementById("slot-b").innerHTML = "<div class='placeholder'>Select a sneaker</div>";
    }
    if (!idA || !idB) {
      document.getElementById("verdict").innerHTML = "";
      return;
    }
    if (idA === idB) {
      document.getElementById("verdict").innerHTML = "<div class='verdict-box'><h3>Pick two different sneakers!</h3></div>";
      return;
    }

    var sneakerA = null;
    var sneakerB = null;
    for (var i = 0; i < sneakers.length; i++) {
      if (sneakers[i].id === idA) {
        sneakerA = sneakers[i];
      }
      if (sneakers[i].id === idB) {
        sneakerB = sneakers[i];
      }
    }

    var tracker = makeScoreTracker();

    var priceClassA = "";
    var priceClassB = "";
    if (sneakerA.price < sneakerB.price) {
      priceClassA = "winner";
      tracker.aWins();
    } else if (sneakerB.price < sneakerA.price) {
      priceClassB = "winner";
      tracker.bWins();
    }

    var ratingClassA = "";
    var ratingClassB = "";
    if (sneakerA.rating > sneakerB.rating) {
      ratingClassA = "winner";
      tracker.aWins();
    } else if (sneakerB.rating > sneakerA.rating) {
      ratingClassB = "winner";
      tracker.bWins();
    }

    var table =
      "<div class='spec-row' style='font-weight:bold;background:#f0f0f0;'>" +
        "<span>Spec</span><span>" + sneakerA.name + "</span><span>" + sneakerB.name + "</span>" +
      "</div>" +
      "<div class='spec-row'><span>Price (lower wins)</span><span class='" + priceClassA + "'>" + formatPrice(sneakerA.price) + "</span><span class='" + priceClassB + "'>" + formatPrice(sneakerB.price) + "</span></div>" +
      "<div class='spec-row'><span>Rating (higher wins)</span><span class='" + ratingClassA + "'>" + sneakerA.rating + "</span><span class='" + ratingClassB + "'>" + sneakerB.rating + "</span></div>" +
      "<div class='spec-row'><span>Brand</span><span>" + sneakerA.brand + "</span><span>" + sneakerB.brand + "</span></div>" +
      "<div class='spec-row'><span>Category</span><span>" + sneakerA.category + "</span><span>" + sneakerB.category + "</span></div>";

    document.getElementById("slot-a").innerHTML = "<img src='" + sneakerA.img + "' alt='" + sneakerA.name + "'>" + table;
    document.getElementById("slot-b").innerHTML = "<img src='" + sneakerB.img + "' alt='" + sneakerB.name + "'>";

    var verdictText = "";
    if (tracker.getA() > tracker.getB()) {
      verdictText = sneakerA.name + " wins!";
    } else if (tracker.getB() > tracker.getA()) {
      verdictText = sneakerB.name + " wins!";
    } else {
      verdictText = "It's a tie!";
    }

    document.getElementById("verdict").innerHTML =
      "<div class='verdict-box'><h3>Result</h3><p>" + verdictText + "</p>" +
      "<p style='margin-top:6px;'>" + sneakerA.name + ": " + tracker.getA() + " pts  |  " + sneakerB.name + ": " + tracker.getB() + " pts</p></div>";
  }
  </script>
</body>
</html>
